<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage — Tableau de bord</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --surface3: #252525;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --text: #ffffff;
      --text-2: #a0a0a0;
      --text-3: #555555;
      --green: #83f752;
      --green-dim: rgba(131,247,82,0.12);
      --green-dim2: rgba(131,247,82,0.06);
      --red: #ff4d4d;
      --red-dim: rgba(255,77,77,0.1);
      --radius: 14px;
      --radius-sm: 9px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ─── LOGIN ─── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      padding: 32px 28px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .login-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px rgba(131,247,82,0.7);
    }
    .login-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .login-subtitle {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 24px;
      font-weight: 500;
    }
    .login-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
      display: block;
    }
    .login-input {
      width: 100%;
      padding: 11px 14px;
      font-size: 13px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      color: var(--text);
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .login-input:focus { border-color: rgba(131,247,82,0.4); }
    .login-btn {
      width: 100%;
      padding: 12px;
      font-size: 13px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      letter-spacing: 0.3px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--green);
      color: #0a0a0a;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
    }
    .login-btn:active { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      display: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--red);
      background: var(--red-dim);
      border: 1px solid rgba(255,77,77,0.2);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      margin-top: 12px;
      text-align: center;
    }
    .login-error.show { display: block; }

    /* ─── APP (hidden until login) ─── */
    #app { display: none; }

    /* ─── TOPBAR ─── */
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .brand-row { display: flex; align-items: center; gap: 10px; }
    .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px rgba(131,247,82,0.6); flex-shrink: 0; }
    .garage-name { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .today-badge { font-size: 11px; font-weight: 600; background: var(--green-dim); color: var(--green); padding: 4px 11px; border-radius: 99px; border: 1px solid rgba(131,247,82,0.2); letter-spacing: 0.3px; white-space: nowrap; }
    .logout-btn { font-size: 11px; font-weight: 600; color: var(--text-3); background: none; border: 1px solid var(--border-strong); border-radius: 99px; padding: 4px 10px; cursor: pointer; font-family: 'Montserrat', sans-serif; }
    .logout-btn:hover { color: var(--text-2); }
    .add-btn-top { display: none; padding: 7px 14px; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: 0.3px; border-radius: 99px; border: none; background: var(--green); color: #0a0a0a; cursor: pointer; white-space: nowrap; }
    .add-btn-top:active { opacity: 0.85; }

    /* ─── LOADING STATE ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 12px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-strong);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; font-weight: 500; color: var(--text-3); }

    /* ─── DESKTOP BOARD ─── */
    .desktop-board { display: none; padding: 20px; gap: 14px; }
    .col { flex: 1; min-width: 0; }
    .col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 0 2px; }
    .col-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-todo { background: var(--text-3); }
    .dot-progress { background: #FAC775; box-shadow: 0 0 6px rgba(250,199,117,0.5); }
    .dot-ready { background: var(--green); box-shadow: 0 0 6px rgba(131,247,82,0.5); }
    .col-title { font-size: 12px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-2); }
    .col-count { font-size: 10px; font-weight: 700; background: var(--surface2); color: var(--text-3); border-radius: 99px; padding: 1px 7px; border: 1px solid var(--border); }
    .col-cards { min-height: 200px; }

    /* ─── MOBILE TABS ─── */
    .mobile-tabs-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 11px 4px; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 500; letter-spacing: 0.3px; color: var(--text-3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.15s, border-color 0.15s; text-align: center; }
    .tab.active { color: var(--green); border-bottom: 2px solid var(--green); }
    .tab-pill { display: inline-block; font-size: 10px; font-weight: 700; background: var(--surface2); color: var(--text-3); border-radius: 99px; padding: 1px 6px; margin-left: 3px; vertical-align: middle; transition: background 0.15s, color 0.15s; }
    .tab.active .tab-pill { background: var(--green); color: #0a0a0a; }
    .mobile-content { padding: 14px 12px; }
    .mobile-panel { display: none; }
    .mobile-panel.active { display: block; }

    /* ─── CARD ─── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 10px; transition: transform 0.1s; }
    .card:active { transform: scale(0.99); }
    .card.done { opacity: 0.3; pointer-events: none; }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .client-name { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }
    .rdv-time { font-size: 11px; font-weight: 700; color: var(--green); background: var(--green-dim); padding: 3px 8px; border-radius: 6px; letter-spacing: 0.8px; }
    .meta-row { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
    .door-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 5px; background: var(--surface3); border: 1px solid var(--border-strong); font-size: 11px; font-weight: 700; color: var(--text-2); flex-shrink: 0; }
    .vehicle-name { font-size: 12px; font-weight: 400; color: var(--text-2); }
    .divider { height: 1px; background: var(--border); margin-bottom: 10px; }
    .card-foot { display: flex; justify-content: space-between; align-items: center; }
    .service-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
    .badge-todo { background: var(--surface3); color: var(--text-2); border: 1px solid var(--border-strong); }
    .badge-progress { background: rgba(250,199,117,0.12); color: #FAC775; border: 1px solid rgba(250,199,117,0.2); }
    .badge-ready { background: var(--green-dim); color: var(--green); border: 1px solid rgba(131,247,82,0.2); }
    .tech-name { font-size: 11px; font-weight: 500; color: var(--text-3); }

    /* ─── BUTTONS ─── */
    .action-btn { width: 100%; margin-top: 10px; padding: 9px 12px; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 0.3px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: transparent; color: var(--text-2); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .action-btn:active { background: var(--surface2); }
    .action-btn.success { color: var(--green); border-color: rgba(131,247,82,0.3); background: var(--green-dim2); }
    .undo-row { display: flex; gap: 8px; margin-top: 10px; }
    .undo-confirm { flex: 1; padding: 9px; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 700; border-radius: var(--radius-sm); border: none; background: var(--green); color: #0a0a0a; cursor: pointer; }
    .undo-cancel { flex: 1; padding: 9px; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 600; border-radius: var(--radius-sm); border: 1px solid rgba(250,199,117,0.3); background: rgba(250,199,117,0.06); color: #FAC775; cursor: pointer; }
    .countdown-bar { height: 2px; background: var(--border); border-radius: 99px; margin-top: 8px; overflow: hidden; }
    .countdown-fill { height: 100%; background: var(--green); border-radius: 99px; width: 100%; transition: width linear; }
    .sms-tag { display: inline-flex; align-items: center; gap: 5px; margin-top: 9px; font-size: 11px; font-weight: 600; color: var(--green); background: var(--green-dim2); padding: 3px 9px; border-radius: 99px; border: 1px solid rgba(131,247,82,0.15); }
    .sms-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px rgba(131,247,82,0.7); }
    .add-btn-mobile { width: 100%; margin-top: 4px; padding: 11px; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 0.3px; border-radius: var(--radius); border: 1.5px dashed rgba(131,247,82,0.25); background: var(--green-dim2); color: var(--green); cursor: pointer; }
    .add-btn-mobile:active { background: var(--green-dim); }

    /* ─── MODAL ─── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 20px 20px 0 0; border: 1px solid var(--border-strong); border-bottom: none; padding: 20px 18px 36px; width: 100%; max-width: 430px; animation: slideUp 0.22s ease; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 36px; height: 3px; background: var(--border-strong); border-radius: 99px; margin: 0 auto 18px; }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 5px; display: block; }
    .form-input { width: 100%; padding: 10px 12px; font-size: 13px; font-family: 'Montserrat', sans-serif; font-weight: 500; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: rgba(131,247,82,0.4); }
    .form-input option { background: var(--surface2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-submit { width: 100%; margin-top: 16px; padding: 12px; font-size: 13px; font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: 0.3px; border-radius: var(--radius-sm); border: none; background: var(--green); color: #0a0a0a; cursor: pointer; }
    .modal-submit:active { opacity: 0.85; }
    .modal-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-cancel { width: 100%; margin-top: 8px; padding: 10px; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 600; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: transparent; color: var(--text-3); cursor: pointer; }

    /* ─── TOAST ─── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: #0a0a0a; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: 0.3px; padding: 10px 20px; border-radius: 99px; z-index: 200; transition: transform 0.25s ease, opacity 0.25s ease; opacity: 0; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: var(--red); color: #fff; }

    /* ─── RESPONSIVE ─── */
    @media (min-width: 768px) {
      .mobile-tabs-bar { display: none; }
      .mobile-content { display: none; }
      .desktop-board { display: flex; }
      .add-btn-top { display: block; }
      .modal-overlay { align-items: center; }
      .modal { border-radius: 16px !important; border-bottom: 1px solid var(--border-strong) !important; max-width: 420px; }
    }
    @media (max-width: 767px) {
      .desktop-board { display: none; }
      .mobile-tabs-bar { display: flex; }
      .mobile-content { display: block; }
      .add-btn-top { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════ LOGIN ═══════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-dot"></div>
      <div class="login-title">Portail Garage</div>
    </div>
    <div class="login-subtitle">Connectez-vous pour accéder au tableau de bord</div>
    <label class="login-label">Nom d'utilisateur</label>
    <input class="login-input" type="text" id="login-username" placeholder="ex. garage-stlaurent" autocomplete="username" />
    <label class="login-label">Mot de passe</label>
    <input class="login-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
    <button class="login-btn" id="login-btn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="login-error">Identifiants incorrects. Veuillez réessayer.</div>
  </div>
</div>

<!-- ═══════════════════════ APP ═══════════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="brand-row">
      <div class="brand-dot"></div>
      <div class="garage-name" id="garage-title">Garage</div>
    </div>
    <div class="topbar-right">
      <div class="today-badge" id="today-badge"></div>
      <button class="add-btn-top" onclick="openModal()">+ Ajouter un RDV</button>
      <button class="logout-btn" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <div class="loading-text">Chargement des interventions...</div>
  </div>

  <!-- DESKTOP -->
  <div class="desktop-board" id="desktop-board" style="display:none;">
    <div class="col">
      <div class="col-header"><div class="col-dot dot-todo"></div><span class="col-title">À faire</span><span class="col-count" id="d-count-0">0</span></div>
      <div class="col-cards" id="d-col-0"></div>
    </div>
    <div class="col">
      <div class="col-header"><div class="col-dot dot-progress"></div><span class="col-title">En cours</span><span class="col-count" id="d-count-1">0</span></div>
      <div class="col-cards" id="d-col-1"></div>
    </div>
    <div class="col">
      <div class="col-header"><div class="col-dot dot-ready"></div><span class="col-title">Prêt</span><span class="col-count" id="d-count-2">0</span></div>
      <div class="col-cards" id="d-col-2"></div>
    </div>
  </div>

  <!-- MOBILE TABS -->
  <div class="mobile-tabs-bar" id="mobile-tabs" style="display:none;">
    <button class="tab active" onclick="switchTab(0)">À faire <span class="tab-pill" id="m-count-0">0</span></button>
    <button class="tab" onclick="switchTab(1)">En cours <span class="tab-pill" id="m-count-1">0</span></button>
    <button class="tab" onclick="switchTab(2)">Prêt <span class="tab-pill" id="m-count-2">0</span></button>
  </div>

  <div class="mobile-content" id="mobile-content" style="display:none;">
    <div class="mobile-panel active" id="m-panel-0"></div>
    <div class="mobile-panel" id="m-panel-1"></div>
    <div class="mobile-panel" id="m-panel-2"></div>
  </div>
</div>

<!-- MODAL AJOUT RDV -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nouveau rendez-vous</div>
    <div class="form-group"><label class="form-label">Véhicule (plaque)</label><input class="form-input" type="text" placeholder="ex. AAA 111" id="i-plaque" /></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="i-date" /></div>
      <div class="form-group"><label class="form-label">Heure</label><input class="form-input" type="time" id="i-time" value="09:00" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Porte</label><select class="form-input" id="i-door"><option value="1">1</option><option value="2">2</option></select></div>
      <div class="form-group"><label class="form-label">Technicien</label><input class="form-input" type="text" placeholder="ex. Luc B." id="i-tech" /></div>
    </div>
    <div class="form-group"><label class="form-label">Travaux à faire</label><input class="form-input" type="text" placeholder="ex. Vidange d'huile" id="i-travaux" /></div>
    <button class="modal-submit" id="modal-submit-btn" onclick="addRdv()">Ajouter le RDV</button>
    <button class="modal-cancel" onclick="closeModal()">Annuler</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ════════════════════════════════════════════
  // CONFIG — Remplace TON_TOKEN_MAITRE_ICI
  // par ton token Agence UpFlow dans VS Code
  // ════════════════════════════════════════════
  const BASE_URL       = 'https://db.agenceupflow.com/api';
  const MASTER_TOKEN   = 'TON_TOKEN_MAITRE_ICI';   // ← REMPLACE ICI
  const GARAGES_TABLE  = '801';

  // État session
  let SESSION = null; // { garageName, token, tableInterventions, tableVehicules }

  // ── DATE ──
  const MOIS=['JAN','FÉV','MAR','AVR','MAI','JUN','JUL','AOÛ','SEP','OCT','NOV','DÉC'];
  const now=new Date();
  const todayISO = now.toISOString().split('T')[0];
  document.getElementById('today-badge').textContent=now.getDate()+' '+MOIS[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('i-date').value = todayISO;

  // ── TOAST ──
  function showToast(msg, isError=false){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.className='toast'+(isError?' error':'');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2800);
  }

  // ── MOBILE TABS ──
  function switchTab(i){
    document.querySelectorAll('.tab').forEach((t,x)=>t.classList.toggle('active',x===i));
    document.querySelectorAll('.mobile-panel').forEach((p,x)=>p.classList.toggle('active',x===i));
  }

  // ── COUNTERS ──
  function mCount(i,d){const e=document.getElementById('m-count-'+i);e.textContent=Math.max(0,parseInt(e.textContent)+d);}
  function dCount(i,d){const e=document.getElementById('d-count-'+i);e.textContent=Math.max(0,parseInt(e.textContent)+d);}
  function updateCount(i,d){mCount(i,d);dCount(i,d);}

  // ════════════════════════════════════════════
  // LOGIN
  // ════════════════════════════════════════════
  async function doLogin(){
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');

    if(!username || !password){ errEl.classList.add('show'); errEl.textContent='Remplis les deux champs.'; return; }

    btn.disabled = true;
    btn.textContent = 'Connexion...';
    errEl.classList.remove('show');

    try {
      const res = await fetch(
        `${BASE_URL}/database/rows/table/${GARAGES_TABLE}/?user_field_names=true&filter__username__equal=${encodeURIComponent(username)}`,
        { headers: { 'Authorization': `Token ${MASTER_TOKEN}` } }
      );
      const data = await res.json();

      if (!data.results || data.results.length === 0) {
        throw new Error('not_found');
      }

      const garage = data.results[0];

      if (garage.Password !== password) {
        throw new Error('wrong_password');
      }

      SESSION = {
        garageName: garage['Nom du garage'],
        token: garage.Token_API,
        tableInterventions: garage.Table_Interventions_ID,
        tableVehicules: garage.Table_Vehicules_ID,
        tableClient: garage.Table_Client_ID
      };

      // Affiche l'app
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('garage-title').textContent = SESSION.garageName;

      await loadInterventions();

    } catch(e) {
      errEl.classList.add('show');
      errEl.textContent = 'Identifiants incorrects. Veuillez réessayer.';
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  }

  // Enter key sur login
  document.getElementById('login-password').addEventListener('keydown', e => {
    if(e.key === 'Enter') doLogin();
  });
  document.getElementById('login-username').addEventListener('keydown', e => {
    if(e.key === 'Enter') doLogin();
  });

  function doLogout(){
    SESSION = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Se connecter';
    // Reset counters
    [0,1,2].forEach(i=>{
      document.getElementById('m-count-'+i).textContent='0';
      document.getElementById('d-count-'+i).textContent='0';
    });
  }

  // ════════════════════════════════════════════
  // LOAD INTERVENTIONS depuis Baserow
  // ════════════════════════════════════════════
  async function loadInterventions(){
    document.getElementById('loading-state').style.display = 'flex';
    document.getElementById('desktop-board').style.display = 'none';
    document.getElementById('mobile-tabs').style.display = 'none';
    document.getElementById('mobile-content').style.display = 'none';

    // Reset colonnes
    ['d-col-0','d-col-1','d-col-2','m-panel-0','m-panel-1','m-panel-2'].forEach(id=>{
      document.getElementById(id).innerHTML='';
    });
    [0,1,2].forEach(i=>{ document.getElementById('m-count-'+i).textContent='0'; document.getElementById('d-count-'+i).textContent='0'; });

    try {
      const res = await fetch(
        `${BASE_URL}/database/rows/table/${SESSION.tableInterventions}/?user_field_names=true&size=100`,
        { headers: { 'Authorization': `Token ${SESSION.token}` } }
      );
      const data = await res.json();

      data.results.forEach(row => renderCard(row));

      // Ajoute bouton + mobile panel 0
      const addBtnM = document.createElement('button');
      addBtnM.className = 'add-btn-mobile';
      addBtnM.textContent = '+ Ajouter un RDV';
      addBtnM.onclick = openModal;
      document.getElementById('m-panel-0').appendChild(addBtnM);

      document.getElementById('loading-state').style.display = 'none';

      // Affiche selon viewport
      if(window.innerWidth >= 768){
        document.getElementById('desktop-board').style.display = 'flex';
      } else {
        document.getElementById('mobile-tabs').style.display = 'flex';
        document.getElementById('mobile-content').style.display = 'block';
      }

    } catch(e) {
      document.getElementById('loading-state').style.display = 'none';
      showToast('Erreur de chargement', true);
    }
  }

  // ── MAP ÉTAT → colonne ──
  function etatToCol(etat){
    if(!etat) return 0;
    const e = etat.toLowerCase();
    if(e.includes('cours') || e === 'en cours') return 1;
    if(e === 'prêt' || e === 'pret' || e.includes('prêt')) return 2;
    return 0; // "Pas commencer" ou autre
  }

  function colToEtat(col){
    if(col === 0) return 'Pas commencer';
    if(col === 1) return 'En cours';
    return 'Prêt';
  }

  // ── RENDER CARD ──
  function renderCard(row){
    const etat = row['État'] || row['Etat'] || '';
    const col = etatToCol(etat);

    // Véhicule : peut être un objet lié ou string
    let vehicleName = '—';
    if(row['Véhicules']){
      if(typeof row['Véhicules'] === 'string') vehicleName = row['Véhicules'];
      else if(Array.isArray(row['Véhicules']) && row['Véhicules'][0]) vehicleName = row['Véhicules'][0].value || row['Véhicules'][0];
      else if(row['Véhicules'].value) vehicleName = row['Véhicules'].value;
    }

    const travaux = row['Travaux à faire'] || '—';
    const tech = row['Technicien'] || '—';
    const porte = row['Numéro de porte'] || '?';
    const dateRaw = row['Date'] || '';
    const timeStr = dateRaw ? dateRaw.split('T')[1]?.substring(0,5).replace(':','H') || '' : '';
    const rowId = row['id'];

    const cardId = 'card-' + rowId;
    const card = document.createElement('div');
    card.className = 'card';
    card.id = cardId;
    card.dataset.rowId = rowId;
    card.dataset.col = col;

    let badgeClass = col === 0 ? 'badge-todo' : col === 1 ? 'badge-progress' : 'badge-ready';

    card.innerHTML = buildCardHTML(cardId, vehicleName, timeStr, porte, travaux, tech, badgeClass, col, rowId);

    // Place dans bonne colonne
    const mPanel = document.getElementById('m-panel-'+col);
    const dCol = document.getElementById('d-col-'+col);

    if(col === 2){
      mPanel.appendChild(card);
    } else {
      const addBtn = mPanel.querySelector('.add-btn-mobile');
      if(addBtn) mPanel.insertBefore(card, addBtn);
      else mPanel.appendChild(card);
    }

    const cardClone = card.cloneNode(true);
    cardClone.id = 'd-' + cardId;
    cardClone.dataset.rowId = rowId;
    rewireButtons(cardClone, cardId, col, rowId);
    dCol.appendChild(cardClone);

    updateCount(col, 1);
  }

  function buildCardHTML(cardId, vehicle, time, porte, travaux, tech, badgeClass, col, rowId){
    const metaRow = col < 2 ? `<div class="meta-row"><span class="door-num">${porte}</span><span class="vehicle-name">${vehicle}</span></div>` : `<div class="vehicle-name" style="margin-bottom:10px;">${vehicle}</div>`;
    const smsTag = col === 2 ? `<div class="sms-tag"><span class="sms-dot"></span>SMS envoyé au client</div>` : '';
    const actionBtn = col < 2 ? `<button class="action-btn" onclick="askConfirm(this,'${cardId}',${col},${rowId})">${col === 0 ? "Démarrer l'entretien" : 'Marquer comme prêt'}</button>` : '';

    return `
      <div class="card-head">
        <span class="client-name">${travaux}</span>
        ${time ? `<span class="rdv-time">${time}</span>` : ''}
      </div>
      ${metaRow}
      <div class="divider"></div>
      <div class="card-foot">
        <span class="service-badge ${badgeClass}">${col === 0 ? 'À faire' : col === 1 ? 'En cours' : 'Prêt'}</span>
        <span class="tech-name">${tech}</span>
      </div>
      ${smsTag}
      ${actionBtn}
    `;
  }

  function rewireButtons(el, origCardId, col, rowId){
    const btn = el.querySelector('.action-btn');
    if(btn) btn.setAttribute('onclick', `askConfirm(this,'d-${origCardId}',${col},${rowId})`);
  }

  // ════════════════════════════════════════════
  // CONFIRM / UNDO
  // ════════════════════════════════════════════
  const pendingTimers = {};

  function askConfirm(btn, cardId, currentCol, rowId){
    const card = document.getElementById(cardId);
    btn.style.display = 'none';

    const undoRow = document.createElement('div');
    undoRow.className = 'undo-row';
    undoRow.id = 'undo-' + cardId;

    const bar = document.createElement('div');
    bar.className = 'countdown-bar';
    const fill = document.createElement('div');
    fill.className = 'countdown-fill';
    bar.appendChild(fill);

    const nextCol = currentCol + 1;
    const label = currentCol === 0 ? 'Démarrer ?' : 'Marquer prêt ?';

    undoRow.innerHTML = `
      <button class="undo-cancel" onclick="cancelAction('${cardId}')">Annuler</button>
      <button class="undo-confirm" onclick="confirmAction('${cardId}',${currentCol},${nextCol},${rowId})">${label}</button>
    `;

    card.appendChild(undoRow);
    card.appendChild(bar);

    const DURATION = 4000;
    const start = Date.now();
    const interval = setInterval(()=>{
      const pct = Math.max(0, 100 - ((Date.now()-start)/DURATION)*100);
      fill.style.width = pct + '%';
      if(Date.now()-start >= DURATION){
        clearInterval(interval);
        confirmAction(cardId, currentCol, nextCol, rowId);
      }
    }, 50);
    pendingTimers[cardId] = interval;
  }

  function cancelAction(cardId){
    clearInterval(pendingTimers[cardId]);
    delete pendingTimers[cardId];
    const card = document.getElementById(cardId);
    const undoRow = document.getElementById('undo-'+cardId);
    const bar = card?.querySelector('.countdown-bar');
    if(undoRow) undoRow.remove();
    if(bar) bar.remove();
    const btn = card?.querySelector('.action-btn');
    if(btn) btn.style.display = '';
    showToast('Action annulée');
  }

  async function confirmAction(cardId, fromCol, toCol, rowId){
    clearInterval(pendingTimers[cardId]);
    delete pendingTimers[cardId];

    // Nettoie UI
    const card = document.getElementById(cardId);
    if(!card) return;
    const undoRow = document.getElementById('undo-'+cardId);
    const bar = card.querySelector('.countdown-bar');
    if(undoRow) undoRow.remove();
    if(bar) bar.remove();

    const newEtat = colToEtat(toCol);

    // Update Baserow
    try {
      await fetch(`${BASE_URL}/database/rows/table/${SESSION.tableInterventions}/${rowId}/?user_field_names=true`, {
        method: 'PATCH',
        headers: {
          'Authorization': `Token ${SESSION.token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ 'État': newEtat })
      });
    } catch(e) {
      showToast('Erreur de mise à jour', true);
      return;
    }

    // Met à jour les deux versions de la carte (mobile + desktop)
    const ids = [cardId, 'd-'+cardId];
    ids.forEach(id => {
      const c = document.getElementById(id);
      if(!c) return;
      const badge = c.querySelector('.service-badge');
      const actionBtn = c.querySelector('.action-btn');

      if(toCol === 1){
        if(badge){ badge.className='service-badge badge-progress'; badge.textContent='En cours'; }
        if(actionBtn){
          actionBtn.textContent = 'Marquer comme prêt';
          actionBtn.style.display = '';
          actionBtn.setAttribute('onclick', `askConfirm(this,'${id}',1,${rowId})`);
        }
        // Déplace la carte vers colonne 1
        const isDesktop = id.startsWith('d-');
        const targetParent = isDesktop ? document.getElementById('d-col-1') : document.getElementById('m-panel-1');
        targetParent.appendChild(c);
      } else if(toCol === 2){
        if(badge){ badge.className='service-badge badge-ready'; badge.textContent='Prêt'; }
        if(actionBtn) actionBtn.remove();
        const metaRow = c.querySelector('.meta-row');
        if(metaRow) metaRow.remove();
        const existing = c.querySelector('.sms-tag');
        if(!existing){
          const sms = document.createElement('div');
          sms.className = 'sms-tag';
          sms.innerHTML = '<span class="sms-dot"></span>SMS envoyé au client';
          c.appendChild(sms);
        }
        const isDesktop = id.startsWith('d-');
        const targetParent = isDesktop ? document.getElementById('d-col-2') : document.getElementById('m-panel-2');
        targetParent.appendChild(c);
      }
    });

    updateCount(fromCol, -1);
    updateCount(toCol, 1);
    showToast(toCol === 1 ? 'Entretien démarré' : 'Client notifié par SMS');
  }

  // ════════════════════════════════════════════
  // AJOUT RDV
  // ════════════════════════════════════════════
  function openModal(){ document.getElementById('modal').classList.add('open'); }
  function closeModal(){ document.getElementById('modal').classList.remove('open'); }
  function closeModalOutside(e){ if(e.target===document.getElementById('modal')) closeModal(); }

  async function addRdv(){
    const plaque   = document.getElementById('i-plaque').value.trim();
    const date     = document.getElementById('i-date').value;
    const time     = document.getElementById('i-time').value;
    const door     = document.getElementById('i-door').value;
    const tech     = document.getElementById('i-tech').value.trim();
    const travaux  = document.getElementById('i-travaux').value.trim();

    if(!plaque || !travaux){ showToast('Remplis les champs obligatoires', true); return; }

    const submitBtn = document.getElementById('modal-submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Ajout en cours...';

    try {
      // Cherche le véhicule par plaque
      const vRes = await fetch(
        `${BASE_URL}/database/rows/table/${SESSION.tableVehicules}/?user_field_names=true&filter__Plaque__equal=${encodeURIComponent(plaque)}`,
        { headers: { 'Authorization': `Token ${SESSION.token}` } }
      );
      const vData = await vRes.json();

      let vehiculeId = null;
      if(vData.results && vData.results.length > 0){
        vehiculeId = vData.results[0].id;
      }

      const dateTimeISO = date && time ? `${date}T${time}:00Z` : null;

      const body = {
        'Travaux à faire': travaux,
        'État': 'Pas commencer',
        'Numéro de porte': parseInt(door),
        'Technicien': tech || null,
      };
      if(dateTimeISO) body['Date'] = dateTimeISO;
      if(vehiculeId) body['Véhicules'] = [vehiculeId];

      const res = await fetch(
        `${BASE_URL}/database/rows/table/${SESSION.tableInterventions}/?user_field_names=true`,
        {
          method: 'POST',
          headers: {
            'Authorization': `Token ${SESSION.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        }
      );
      const newRow = await res.json();
      renderCard(newRow);
      closeModal();
      showToast('RDV ajouté');

      ['i-plaque','i-tech','i-travaux'].forEach(x=>document.getElementById(x).value='');
      document.getElementById('i-time').value='09:00';
      document.getElementById('i-date').value=todayISO;

    } catch(e){
      showToast('Erreur lors de l\'ajout', true);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Ajouter le RDV';
    }
  }
</script>
